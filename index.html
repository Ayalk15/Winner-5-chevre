
<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>5 חבר'ה - ליגת העל</title>
    
    <script>
      // 1. תופס שגיאות קוד - יקפיץ טקסט אדום אם יש שגיאת סינטקס
      window.onerror = function(message, source, lineno, colno, error) {
        document.body.innerHTML = `
          <div style="color: red; background: white; padding: 20px; font-family: sans-serif; direction: ltr; text-align: left; position: fixed; top:0; left:0; width:100%; height:100%; z-index:99999; overflow:auto;">
            <h2>🚨 אופס! יש שגיאת קוד באתר:</h2>
            <p><strong>Error:</strong> ${message}</p>
            <p><strong>File:</strong> ${source}</p>
            <p><strong>Line:</strong> ${lineno}:${colno}</p>
            <p style="color: black; font-weight: bold; margin-top: 20px; font-size: 16px;">📸 צלם לי את המסך הזה ונפתור את זה בשנייה!</p>
          </div>
        `;
        return false;
      };

      // 2. תופס שגיאות טעינה - יקפיץ שגיאה אם הדפדפן לא מוצא את הקבצים הפנימיים
      window.addEventListener('error', function(event) {
        if (event.target.tagName === 'SCRIPT' || event.target.tagName === 'LINK') {
          document.body.innerHTML = `
            <div style="color: red; background: white; padding: 20px; font-family: sans-serif; direction: rtl; text-align: right; position: fixed; top:0; left:0; width:100%; height:100%; z-index:99999;">
              <h2>🚨 שגיאת טעינה קריטית:</h2>
              <p>הדפדפן לא מצליח למצוא את הקובץ: <span style="color:blue; font-family:monospace;">${event.target.src || event.target.href}</span></p>
              <p>זה קורה בדרך כלל בגלל שהשם של התיקייה או הקובץ ב-GitHub לא תואם בדיוק לאותיות הגדולות/קטנות בקוד.</p>
              <p style="color: black; font-weight: bold; margin-top: 20px;">📸 צלם לי את המסך הזה ונבין מה חסר!</p>
            </div>
          `;
        }
      }, true);
    </script>
  </head>
  <body class="bg-gray-900">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
